<main class="layout">
  <header class="topbar">
    <div class="brand">
      <p class="brand-eyebrow">Panel privado</p>
      <h1>{{ title }}</h1>
    </div>

    <nav class="nav" aria-label="Navegacion principal">
      <a routerLink="/" [routerLinkActive]="'active'" [routerLinkActiveOptions]="{ exact: true }">
        Dashboard
      </a>
      <a routerLink="/productos" routerLinkActive="active">Productos</a>
      <a routerLink="/clientes" routerLinkActive="active">Clientes</a>
      <a routerLink="/ventas" routerLinkActive="active">Ventas</a>
      <a routerLink="/pedidos" routerLinkActive="active">Pedidos</a>
      <a routerLink="/pagos" routerLinkActive="active">Pagos</a>
    </nav>
  </header>

  <section class="content">
    <router-outlet />
  </section>
</main>
